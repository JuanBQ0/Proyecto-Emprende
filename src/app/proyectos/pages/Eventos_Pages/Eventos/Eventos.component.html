<div class="bg-white">
  <!-- Espacio superior para separar del nav -->
  <div class="w-full text-center mb-16 mt-20">
    <div class="bg-gradient-to-r from-blue-100 to-blue-300 rounded-none p-12 shadow-md">
      <h2 class="text-6xl font-extrabold text-blue-900 mb-4 relative inline-block">
        <span class="text-7xl block mb-4 animate-pulse">📸</span>
        <span class="relative z-10">Eventos en Curso</span>
      </h2>
    </div>
  </div>

  <div class="min-h-screen bg-gradient-to-br px-6 py-16 relative overflow-hidden">
    <!-- Galería de eventos -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      @for (item of imagenesEventos; track item; let i = $index) {
        <div
          class="bg-white rounded-xl overflow-hidden shadow-lg transition-transform hover:scale-105 p-4 flex justify-center items-center cursor-pointer border border-green-200"
          (click)="abrirImagen(item)"
        >
          <img
            [src]="item"
            alt="Evento"
            class="max-h-80 w-full object-contain rounded-md"
          />
        </div>
      }
    </div>

    <!-- Modal -->
    @if (imagenAmpliada) {

    <div
    class="fixed inset-0 bg-opacity-80 backdrop-blur-sm flex justify-center items-center z-50"
    (click)="cerrarImagen()"
  >
    <div class="relative">
      <button
        class="absolute top-2 right-2 text-red-600 text-3xl z-10"
        (click)="cerrarImagen(); $event.stopPropagation()"
      >
        &times;
      </button>
      <img
        [src]="imagenAmpliada!"
        class="max-h-[90vh] max-w-[90vw] rounded-3xl border-[6px] border-white shadow-2xl object-contain"
        (click)="$event.stopPropagation()"
      />
    </div>
  </div>

  }
  </div>
</div>

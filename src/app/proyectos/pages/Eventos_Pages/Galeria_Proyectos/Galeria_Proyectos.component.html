<div
  class="min-h-screen flex flex-row bg-cover bg-center p-4 md:p-6 lg:p-8"
  style="background-image: url('image/Decorador/galerias.jpg');"
>
  <!-- Drawer -->
  <app-draw-galeria
    class="w-[200px] sm:w-[120px] md:w-[180px] lg:w-[200px] bg-[#828382] p-1 mb-6 md:mb-0
           rounded-lg md:rounded-none shadow-md md:shadow-none"
  >
  </app-draw-galeria>

  <!-- Contenido principal -->
  <div class="flex-1 flex flex-col p-4 sm:p-6 md:p-12">
    <!-- Título -->
    <h2
      class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-white mb-6 md:mb-12 text-center drop-shadow-lg px-2 mt-14 sm:mt-8 md:mt-10"
    >
      Explora proyectos destacados
    </h2>

    <!-- Grid de Proyectos -->
    <div
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6 place-items-stretch"
    >
      @for (proyecto of proyectos; track proyecto) {
        <div
          class="bg-white/95 rounded-xl shadow hover:shadow-xl transition-transform hover:scale-[1.02]
                 cursor-pointer overflow-hidden w-full"
          (click)="abrirModal(proyecto)"
        >
          <!-- Imagen -->
          <div class="aspect-square w-full">
            <img
              [src]="proyecto.imagen"
              alt="Proyecto"
              class="w-full h-full object-cover rounded-t-xl"
            />
          </div>

          <!-- Contenido -->
          <div class="p-4 flex flex-col text-sm space-y-2">
            <h3 class="text-base font-semibold text-gray-900 text-center">
              {{ proyecto.titulo }}
            </h3>
            <p class="text-xs text-gray-500 italic text-center">
              {{ proyecto.categoria }}
            </p>
            <p class="text-gray-700 text-center line-clamp-3">
              {{ proyecto.descripcion }}
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
